<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Administrador</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.container{
max-width:500px;
margin:60px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#007bff;
border:none;
color:white;
font-weight:bold;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.link{
text-align:center;
margin-top:10px;
}

</style>

</head>
<body>

<div class="container">

<h2>Registro Administrador</h2>

<form method="POST" action="/auth/registro">

<input type="text" name="nombre" placeholder="Nombre" required>

<input type="text" name="apellido" placeholder="Apellido" required>

<input type="text" name="cargo" placeholder="Cargo" required>

<input type="text" name="identificacion" placeholder="Identificación" required>

<input type="text" name="telefono" placeholder="Teléfono" required>

<input type="email" name="correo" placeholder="Correo" required>

<input type="password" name="clave" placeholder="Contraseña" required>

<button type="submit">Registrarse</button>

</form>

<div class="link">
<a href="/auth/login">Volver al login</a>
</div>

</div>

</body>
</html>
